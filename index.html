<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小笛老师-奥数每日一题</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        
        /* 题目区域 */
        .question-section {
            padding: 25px 20px;
            border-bottom: 3px solid #f0f0f0;
        }
        
        .section-title {
            text-align: center;
            font-size: 20px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .section-date {
            text-align: center;
            font-size: 14px;
            color: #999;
            margin-bottom: 20px;
        }
        
        .question-image-container {
            background: #fafafa;
            border-radius: 12px;
            padding: 15px;
            border: 2px dashed #e0e0e0;
        }
        
        .question-image {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
        }
        
        /* 提示文字区域 */
        .hint-section {
            padding: 20px;
            text-align: center;
            background: #fff5f5;
            border-top: 1px solid #ffe0e0;
            border-bottom: 1px solid #ffe0e0;
        }
        
        .hint-text {
            color: #e53935;
            font-size: 16px;
            font-weight: 600;
            line-height: 1.5;
        }
        
        .hint-icon {
            font-size: 20px;
            margin-right: 8px;
        }
        
        /* 二维码区域 */
        .qr-section {
            padding: 25px 20px;
            text-align: center;
            background: linear-gradient(180deg, #fafafa 0%, #f0f0f0 100%);
        }
        
        .qr-image {
            max-width: 260px;
            width: 100%;
            height: auto;
            border-radius: 8px;
            border: 3px solid #fff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        .qr-hint {
            margin-top: 15px;
            color: #52c41a;
            font-size: 14px;
            font-weight: 500;
        }
        
        .qr-subtext {
            margin-top: 8px;
            color: #999;
            font-size: 12px;
        }
        
        /* 底部信息 */
        .footer {
            text-align: center;
            padding: 15px;
            background: #f5f5f5;
            color: #999;
            font-size: 12px;
        }
        
        /* 加载失败提示 */
        .image-error {
            text-align: center;
            padding: 40px 20px;
            color: #999;
            font-size: 14px;
        }
        
        /* 移动端优化 */
        @media (max-width: 480px) {
            body {
                padding: 15px;
            }
            
            .container {
                border-radius: 12px;
            }
            
            .section-title {
                font-size: 18px;
            }
            
            .hint-text {
                font-size: 15px;
            }
            
            .qr-image {
                max-width: 240px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 上方：题目区域 -->
        <div class="question-section">
            <div class="section-title">📐 小笛老师奥数每日一题:计算突破周</div>
            <p class="section-date" id="currentDate"></p>
            
            <div class="question-image-container">
                <img 
                    class="question-image" 
                    id="questionImage" 
                    src="" 
                    alt="今日奥数题"
                    onerror="this.onerror=null; this.src=''; document.getElementById('imageError').style.display='block';"
                >
                <div class="image-error" id="imageError" style="display: none;">
                    ⚠️ 题目图片加载失败，请联系管理员
                </div>
            </div>
        </div>
        
        <!-- 中间：提示文字 -->
        <div class="hint-section">
            <p class="hint-text">
                <span class="hint-icon">🎁</span>
                加群免费获得答案和更多每日一题
            </p>
        </div>
        
        <!-- 下方：二维码区域 -->
        <div class="qr-section">
            <img 
                class="qr-image" 
                src="group.jpg?t=<%= Date.now() %>" 
                alt="微信群二维码"
                id="qrImage"
            >
            <p class="qr-hint">👆 长按识别二维码进群</p>
            <p class="qr-subtext">每日更新 · 免费答疑 · 学习交流</p>
        </div>
        
        <!-- 底部 -->
        <div class="footer">
            奥数每日一题 · 坚持学习每天进步
        </div>
    </div>
    
    <script>
        // ==================== 自动计算第几天（7天循环）====================
        function getDayIndex() {
            const now = new Date();
            // 获取今天是今年的第几天
            const startOfYear = new Date(now.getFullYear(), 0, 0);
            const diff = now - startOfYear;
            const oneDay = 1000 * 60 * 60 * 24;
            const dayOfYear = Math.floor(diff / oneDay);
            
            // 7天循环，返回 1-7
            const dayIndex = ((dayOfYear - 1) % 7) + 1;
            return dayIndex;
        }
        
        // ==================== 初始化页面 ====================
        function initPage() {
            // 1. 显示当前日期
            const dateEl = document.getElementById('currentDate');
            const today = new Date();
            const dateStr = today.getFullYear() + '年' + 
                           String(today.getMonth() + 1).padStart(2, '0') + '月' + 
                           String(today.getDate()).padStart(2, '0') + '日';
            dateEl.textContent = dateStr;
            
            // 2. 计算今天是第几天（1-7），用于加载对应图片
            const dayIndex = getDayIndex();
            
            // 3. 加载对应的题目图片（q1.jpg ~ q7.jpg）
            const questionImage = document.getElementById('questionImage');
            const timestamp = Date.now(); // 防止缓存
            questionImage.src = 'q' + dayIndex + '.jpg?t=' + timestamp;
            
            // 4. 二维码也加时间戳防止缓存
            const qrImage = document.getElementById('qrImage');
            qrImage.src = 'group.jpg?t=' + timestamp;
            
            // 5. 控制台输出调试信息
            console.log('【奥数每日一题】');
            console.log('日期:', dateStr);
            console.log('周期天数:', dayIndex);
            console.log('加载图片:', 'q' + dayIndex + '.jpg');
        }
        
        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
